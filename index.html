<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a3fa8" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Winning Wall" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- SEO / share -->
    <meta name="description" content="AHS Offseason Basketball Training Platform" />
    <meta property="og:title" content="AHS Winning Wall" />
    <meta property="og:description" content="Track workouts, compete on the leaderboard, and grind this offseason." />
    <meta property="og:image" content="/icons/icon-512.png" />

    <title>AHS Winning Wall</title>

    <!-- OneSignal Push Notifications -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function (OneSignal) {
        await OneSignal.init({
          appId: "d888dd8c-4145-422f-a725-76679060e8e9",
          // Point OneSignal at our existing service worker (which already
          // handles PWA offline caching) instead of registering a second
          // service worker file at the same scope.
          serviceWorkerParam: { scope: "/" },
          serviceWorkerPath: "sw.js",
        });
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
